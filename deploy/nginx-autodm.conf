# Nginx — autodm.pt
# Copiar: sudo cp deploy/nginx-autodm.conf /etc/nginx/sites-available/autodm
# Ativar: sudo ln -sf /etc/nginx/sites-available/autodm /etc/nginx/sites-enabled/
# SSL:    sudo certbot --nginx -d autodm.pt -d www.autodm.pt

server {
    listen 80;
    listen [::]:80;
    server_name autodm.pt www.autodm.pt;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
